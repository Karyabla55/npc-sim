<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC-Sim — Agent-Based Simulation Dashboard</title>
    <meta name="description" content="A deterministic, psychology-driven agent-based simulation framework for emergent NPC behavior research.">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>

<!-- ═══ Config Screen ═══ -->
<div id="config-screen" class="config-overlay">
    <div class="card config-card">
        <h2>Simulation Setup</h2>
        <div class="config-grid">
            <label>NPC Count</label><input type="number" id="cfg-npc" value="5" min="1" max="50">
            <label>Start Time</label><input type="time" id="cfg-time" value="06:00">
            <label>Speed</label>
            <select id="cfg-speed">
                <option value="1">1×</option>
                <option value="5">5×</option>
                <option value="10">10×</option>
                <option value="60">60×</option>
                <option value="300">300×</option>
            </select>
            <label>Seed</label><input type="number" id="cfg-seed" placeholder="Random">
            <label>Enable LLM</label><input type="checkbox" id="cfg-llm">
            <label>Log Enabled</label><input type="checkbox" id="cfg-log" checked>
        </div>
        <button class="btn btn-primary" onclick="startSimulation()" style="width:100%; margin-top:1.5rem;">Start Simulation</button>
    </div>
</div>

<!-- ═══ Header ═══ -->
<header class="header" id="header">
    <div class="header-title">
        <div class="header-logo">N</div>
        <h1>NPC-Sim</h1>
    </div>

    <div class="header-stats">
        <div class="stat-badge">
            <span class="label">Day</span>
            <span class="value" id="stat-day">0</span>
        </div>
        <div class="stat-badge">
            <span class="label">Hour</span>
            <span class="value" id="stat-hour">0:00</span>
        </div>
        <div class="stat-badge">
            <span class="label">Tick</span>
            <span class="value" id="stat-tick">0</span>
        </div>
        <div class="stat-badge">
            <span class="label">Pop</span>
            <span class="value" id="stat-pop">0</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn active" id="btn-play" onclick="togglePause()">▶ Play</button>
        <div class="speed-control">
            <label>Speed</label>
            <select id="speed-select" onchange="changeSpeed(this.value)" style="background:transparent; color:var(--text-accent); border:none; outline:none; font-family:'JetBrains Mono', monospace; font-weight:600; cursor:pointer;">
                <option value="1">1×</option>
                <option value="5">5×</option>
                <option value="10">10×</option>
                <option value="60">60×</option>
                <option value="300">300×</option>
            </select>
        </div>
        <button class="btn danger" onclick="resetSim()">🛑 Stop & Reset</button>
        <button class="btn" id="btn-inject" onclick="toggleInject()">💫 Inject</button>
    </div>
</header>

<!-- ═══ Inject Stimulus Panel ═══ -->
<div class="inject-panel" id="inject-panel">
    <select id="inject-type">
        <option value="Threat">⚠ Threat</option>
        <option value="Food">🍖 Food</option>
        <option value="Ally">👥 Ally</option>
    </select>
    <input type="number" id="inject-x" value="50" placeholder="X" style="width:4em">
    <input type="number" id="inject-z" value="50" placeholder="Z" style="width:4em">
    <input type="range" id="inject-intensity" min="0.1" max="1.0" step="0.05" value="0.85">
    <button class="btn" onclick="injectStimulus()">Send</button>
</div>

<!-- ═══ Main Grid ═══ -->
<div class="main">

    <!-- Map -->
    <div class="card map-container">
        <div class="card-header">
            <h2>🗺 World Map</h2>
            <span class="pop-label" id="map-info" style="font-size:0.75rem;color:var(--text-muted)"></span>
        </div>
        <canvas id="map-canvas"></canvas>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">

        <!-- Population Stats -->
        <div class="card">
            <div class="card-header"><h2>📊 Population</h2></div>
            <div class="card-body">
                <div class="pop-stats">
                    <div class="pop-stat"><span class="pop-value" id="ps-hunger" style="color:var(--accent-5)">0%</span><span class="pop-label">Hunger</span></div>
                    <div class="pop-stat"><span class="pop-value" id="ps-thirst" style="color:var(--accent-3)">0%</span><span class="pop-label">Thirst</span></div>
                    <div class="pop-stat"><span class="pop-value" id="ps-happy" style="color:var(--accent-4)">0</span><span class="pop-label">Happy</span></div>
                    <div class="pop-stat"><span class="pop-value" id="ps-stress" style="color:var(--accent-6)">0%</span><span class="pop-label">Stress</span></div>
                </div>
            </div>
        </div>

        <!-- NPC List -->
        <div class="card npc-list">
            <div class="card-header"><h2>👥 NPCs</h2></div>
            <div class="card-body" id="npc-list-body"></div>
        </div>

        <!-- NPC Detail -->
        <div class="card detail-panel" id="detail-panel" style="display:none">
            <div class="card-header">
                <h2 id="detail-name">NPC Detail</h2>
                <button class="btn" onclick="closeDetail()" style="padding:0.2rem 0.5rem;font-size:0.75rem">✕</button>
            </div>
            <div class="card-body" id="detail-body"></div>
        </div>

        <!-- Event Log -->
        <div class="card event-log">
            <div class="card-header"><h2>📜 Events</h2></div>
            <div class="card-body" id="event-log-body"></div>
        </div>

    </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
